<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Homologacao ISO 8583</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="page">
    <div class="brand-bar">
      <img src="/static/Fiserv_Logo.svg.png" alt="Fiserv" class="brand-logo" />
      <span class="brand-product" data-i18n="portal.brand">Portal de Homologacao</span>
      <div class="language-switcher">
        <label for="languageSelect" data-i18n="lang.label">Idioma</label>
        <select id="languageSelect" aria-label="Idioma">
          <option value="pt" data-i18n="lang.pt">Portugues</option>
          <option value="es" data-i18n="lang.es">Espanhol</option>
        </select>
      </div>
      <div style="margin-left: auto;">
        <button type="button" class="btn secondary-btn" style="font-size:0.82rem; padding: 8px 14px;" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='/'; }" data-i18n="common.back">Voltar</button>
      </div>
    </div>

    <header class="hero">
      <p class="eyebrow" data-i18n="portal.access">Acesso</p>
      <h1 data-i18n="portal.selectProfile">Selecione seu perfil</h1>
      <p class="subtitle" data-i18n="portal.subtitle">Cliente acessa o fluxo de auto-homologacao. Administrador acessa o painel interno com autenticação.</p>
    </header>

    <section class="panel role-grid-panel">
      <div class="role-grid">
        <article class="role-card">
          <p class="role-tag" data-i18n="portal.clientTag">CLIENTE</p>
          <h2 data-i18n="portal.clientTitle">Auto-homologacao</h2>
          <a href="/cliente" class="btn role-btn" data-i18n="portal.enterClient">Entrar como Cliente</a>
        </article>

        <article class="role-card">
          <p class="role-tag" data-i18n="portal.adminTag">ADMINISTRADOR</p>
          <h2 data-i18n="portal.adminTitle">Painel Interno</h2>
          <a href="/admin/login" class="btn role-btn" data-i18n="portal.enterAdmin">Entrar como Administrador</a>
        </article>
      </div>
    </section>
  </main>
  <script src="/static/i18n.js"></script>
</body>
</html>
