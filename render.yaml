services:
  - type: web
    name: homolog-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_homolog_web:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: starter

    # Disco persistente: logs e dados de clientes sobrevivem a deploys e reinícios
    disk:
      name: homolog-data
      mountPath: /var/data
      sizeGB: 10

    envVars:
      # Diretório dos logs de auditoria (arquivos .txt)
      - key: HOMOLOG_LOGS_DIR
        value: /var/data/LOGS de TESTE

      # Diretório dos dados de homologação de clientes
      - key: HOMOLOG_CLIENT_STORE_DIR
        value: /var/data/HOMOLOGACAO_CLIENTES

      # Chave secreta da sessão Flask (troque por uma string aleatória longa)
      - key: HOMOLOG_SECRET_KEY
        generateValue: true

      # Chave de autenticação para upload administrativo de logs
      # Configure manualmente no painel do Render após o deploy
      # Exemplo: HOMOLOG_ADMIN_KEY = minha-chave-secreta-2026
      - key: HOMOLOG_ADMIN_KEY
        value: ""
